<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Seguimiento</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#001845;
  --navy2:#002a6e;
  --blue:#1a56db;
  --blue-l:#e8efff;
  --surface:#ffffff;
  --bg:#ffffff;
  --border:#e2e0d8;
  --text:#12110e;
  --muted:#6b6858;
  --soft:#a09e94;
  --red:#c0392b;--red-l:#fef2f2;
  --amber:#b45309;--amber-l:#fffbeb;
  --green:#15803d;--green-l:#f0fdf4;
}

body{
  font-family:'Sora',sans-serif;
  background:#fff;
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(0,24,69,0.97);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,.08);
  padding:0 2rem;
  height:52px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{
  font-family:'Playfair Display',serif;
  font-size:18px;
  color:#fff;
  display:flex;align-items:center;gap:10px;
}
.logo-pulse{
  width:8px;height:8px;border-radius:50%;
  background:#4fa3f7;
  animation:pulse 2.2s ease infinite;
}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(79,163,247,.4)}
  70%{box-shadow:0 0 0 8px rgba(79,163,247,0)}
  100%{box-shadow:0 0 0 0 rgba(79,163,247,0)}
}
.admin-link{
  font-size:11px;font-weight:600;
  color:rgba(255,255,255,.4);
  text-decoration:none;
  padding:5px 13px;
  border:1px solid rgba(255,255,255,.12);
  border-radius:7px;
  transition:all .2s;
}
.admin-link:hover{color:#fff;border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.07)}

/* ── HERO CENTRADO ── */
.hero{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:2rem 1.5rem 6rem;
}

.hero-label{
  font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--soft);
  margin-bottom:1.25rem;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.9rem,4vw,2.75rem);
  font-weight:700;
  color:var(--navy);
  margin-bottom:2.25rem;
  letter-spacing:-.3px;
  text-align:center;
}

/* ── SEARCH CARD ── */
.search-card{
  background:#fff;
  border:1.5px solid #dde3f0;
  border-radius:60px;
  padding:6px 6px 6px 22px;
  width:100%;max-width:560px;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 4px 32px rgba(0,40,120,.1), 0 1px 4px rgba(0,0,0,.06);
  transition:box-shadow .2s, border-color .2s;
}
.search-card:focus-within{
  border-color:#93b4f5;
  box-shadow:0 6px 40px rgba(26,86,219,.14), 0 1px 4px rgba(0,0,0,.06);
}
.search-card input{
  flex:1;
  border:none;outline:none;
  font-family:'Sora',sans-serif;
  font-size:14px;font-weight:500;
  color:var(--text);
  background:transparent;
  padding:9px 0;
  min-width:0;
}
.search-card input::placeholder{color:#b5b3a8;font-weight:400}
.btn-search{
  height:42px;padding:0 22px;
  background:var(--navy2);color:#fff;
  border:none;border-radius:50px;
  font-family:'Sora',sans-serif;
  font-size:13px;font-weight:700;
  cursor:pointer;white-space:nowrap;
  transition:all .18s;flex-shrink:0;
}
.btn-search:hover{background:var(--blue)}
.btn-search:active{transform:scale(.97)}

.search-hint{
  margin-top:1rem;
  font-size:11px;color:var(--soft);
  text-align:center;
}

/* ── RESULTS ── */
.results-wrap{
  width:100%;max-width:1160px;
  margin:0 auto;
  padding:0 1.5rem 2.5rem;
}

.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.05);
}
.panel-header{
  padding:.75rem 1.25rem;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:#fafaf8;
  flex-wrap:wrap;gap:.5rem;
}
.panel-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.dot-blue{width:8px;height:8px;border-radius:50%;background:var(--blue);display:inline-block}

/* ── TABLE ── */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:9px 12px;text-align:left;font-size:9px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.7px;border-bottom:1px solid var(--border);background:#fafaf8;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f8f8f5}

.stg{display:flex;gap:4px;flex-wrap:wrap}
.ec{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid;white-space:nowrap;font-weight:600}
.ec-done{background:var(--green-l);color:var(--green);border-color:#86efac}
.ec-link{text-decoration:none;color:inherit;display:inline-flex}
.ec-link:hover .ec{background:#d1fae5;border-color:#34d399}

.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;border:1px solid transparent;white-space:nowrap}
.b-proc{background:var(--blue-l);color:var(--blue);border-color:#bfdbfe}
.b-done{background:var(--green-l);color:var(--green);border-color:#86efac}
.b-sinef{background:#f3f4f6;color:#6b7280;border-color:#e5e7eb}
.b-alert{background:var(--red-l);color:var(--red);border-color:#fca5a5}
.b-warn{background:var(--amber-l);color:var(--amber);border-color:#fde68a}
.b-venc{background:#fff1f2;color:#e11d48;border-color:#fda4af}
.b-oculto{background:#f3f4f6;color:#9ca3af;border-color:#e5e7eb}

.flag{display:inline-block;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;margin:1px}
.f-ok{background:var(--green-l);color:var(--green)}
.f-no{background:#f3f4f6;color:#9ca3af}
.f-warn{background:var(--amber-l);color:#92400e}

.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3.5rem 2rem;gap:.75rem;color:var(--muted)}
.state-box .icon{font-size:2.25rem;opacity:.5}
.state-box p{font-size:13px;line-height:1.6;text-align:center;max-width:280px}

.spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:3rem auto}
@keyframes spin{to{transform:rotate(360deg)}}

.pg-btn{height:30px;min-width:30px;padding:0 8px;border:1.5px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Sora',sans-serif}
.pg-btn:hover:not(:disabled){background:var(--blue-l);border-color:var(--blue);color:var(--blue)}
.pg-btn.active{background:var(--navy2);border-color:var(--navy2);color:#fff}
.pg-btn:disabled{opacity:.35;cursor:not-allowed}

footer{padding:1.25rem;text-align:center;font-size:11px;color:var(--soft);border-top:1px solid var(--border)}

/* Animaciones entrada */
.hero-label{animation:fadeUp .5s ease both}
.hero h1{animation:fadeUp .5s .08s ease both}
.search-card{animation:fadeUp .5s .16s ease both}
.search-hint{animation:fadeUp .4s .28s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-pulse"></span>
    Seguimiento
  </div>
  <a class="admin-link" href="/admin">⚙ Administración</a>

</header>

<div class="hero" id="hero-section">
  <h1>Consulta</h1>

  <div class="search-card">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#b5b3a8" stroke-width="2.5" style="flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input
      type="text"
      id="search-inp"
      placeholder="Nombre, RUT, materia, unidad..."
      oninput="debounceSearch()"
      onkeydown="if(event.key==='Enter')buscar()"
      autocomplete="off"
    >
    <button class="btn-search" onclick="buscar()">Buscar</button>
  </div>
  <div class="search-hint">Escribe para buscar en tiempo real</div>
</div>

<div class="results-wrap" id="results-wrap" style="display:none">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">
        <span class="dot-blue"></span>
        <span id="panel-title">Resultados</span>
      </span>
    </div>
    <div id="results-body"></div>
  </div>
</div>

<footer>Sistema de Seguimiento de Contratos</footer>

<script>
let gPage=1, gData=[], _timer=null;
const PER_PAGE=25;

function fmtD(d){if(!d)return'—';const p=d.split('-');return`${p[2]}/${p[1]}/${p[0]}`;}

function badgeFull(c){
  if(c.ocultar_estado) return`<span class="badge b-oculto">—</span>`;
  if(c.alerta==='vencido')     return`<span class="badge b-venc">💀 Vencido</span>`;
  if(c.alerta==='critico')     return`<span class="badge b-alert">⚠ Crítico</span>`;
  if(c.alerta==='advertencia') return`<span class="badge b-warn">⏰ Por vencer</span>`;
  if(c.estado==='completado')  return`<span class="badge b-done">✓ Completado</span>`;
  if(c.estado==='sin_efecto')  return`<span class="badge b-sinef">Sin efecto</span>`;
  return`<span class="badge b-proc">● En proceso</span>`;
}

function etapasHtml(etapas){
  if(!etapas||!etapas.length) return'<span style="color:var(--soft);font-size:10px">Sin etapas</span>';
  const done=etapas.filter(e=>e.completada);
  if(!done.length) return'<span style="color:var(--soft);font-size:10px">Ninguna completada</span>';
  return done.map(e=>e.link
    ?`<a class="ec-link" href="${e.link}" target="_blank"><span class="ec ec-done">✓ ${e.nombre} 🔗</span></a>`
    :`<span class="ec ec-done">✓ ${e.nombre}</span>`
  ).join(' ');
}

function diasHtml(c){
  if(c.dias_restantes===null||c.ocultar_estado||c.estado!=='en_proceso') return'';
  if(c.dias_restantes<=0)  return`<div style="font-size:10px;font-weight:700;color:var(--red)">VENCIDO</div>`;
  if(c.dias_restantes<=7)  return`<div style="font-size:10px;font-weight:700;color:var(--red)">${c.dias_restantes}d</div>`;
  if(c.dias_restantes<=20) return`<div style="font-size:10px;font-weight:700;color:var(--amber)">${c.dias_restantes}d</div>`;
  return`<div style="font-size:10px;color:var(--soft)">${c.dias_restantes}d</div>`;
}

function renderTable(){
  const el=document.getElementById('results-body');
  const wrap=document.getElementById('results-wrap');
  wrap.style.display='block';

  // Contraer hero cuando hay resultados
  const hero=document.getElementById('hero-section');
  hero.style.paddingTop='1.5rem';
  hero.style.paddingBottom='1.5rem';

  if(!gData.length){
    document.getElementById('panel-title').textContent='Sin resultados';
    el.innerHTML=`<div class="state-box"><span class="icon">🔍</span><p>Sin trámites para <strong>"${document.getElementById('search-inp').value}"</strong></p></div>`;
    return;
  }

  const totalPages=Math.max(1,Math.ceil(gData.length/PER_PAGE));
  if(gPage>totalPages) gPage=1;
  const pageData=gData.slice((gPage-1)*PER_PAGE,gPage*PER_PAGE);
  document.getElementById('panel-title').innerHTML=`${gData.length} resultado${gData.length!==1?'s':''} encontrado${gData.length!==1?'s':''}`;

  function pgHtml(){
    if(totalPages<=1) return'';
    const b=[];
    b.push(`<button class="pg-btn" ${gPage===1?'disabled':''} onclick="gPage--;renderTable()">‹</button>`);
    for(let i=1;i<=totalPages;i++){
      if(i===1||i===totalPages||Math.abs(i-gPage)<=2) b.push(`<button class="pg-btn ${i===gPage?'active':''}" onclick="gPage=${i};renderTable()">${i}</button>`);
      else if(Math.abs(i-gPage)===3) b.push(`<span style="padding:0 4px;color:var(--soft)">…</span>`);
    }
    b.push(`<button class="pg-btn" ${gPage===totalPages?'disabled':''} onclick="gPage++;renderTable()">›</button>`);
    return`<div style="display:flex;align-items:center;gap:4px;padding:.875rem 1.25rem;border-top:1px solid var(--border);justify-content:space-between;flex-wrap:wrap">
      <span style="font-size:11px;color:var(--muted)">Mostrando ${(gPage-1)*PER_PAGE+1}–${Math.min(gPage*PER_PAGE,gData.length)} de ${gData.length}</span>
      <div style="display:flex;gap:3px">${b.join('')}</div></div>`;
  }

  el.innerHTML=`
  <div class="tw"><table>
    <thead><tr>
      <th>Nombre / RUT</th><th>Materia</th><th>Responsable</th>
      <th>Etapas completadas</th><th>Estado</th><th>Flags</th>
      <th>Ingreso</th><th>Vence</th>
    </tr></thead>
    <tbody>
    ${pageData.map(c=>`<tr>
      <td><strong style="font-size:13px">${c.nombre}</strong><div style="font-size:10px;font-family:monospace;color:var(--muted);margin-top:1px">${c.rut}</div></td>
      <td style="font-size:11px;font-weight:600;color:#1a56db">${c.materia||'<span style="color:var(--soft);font-weight:400">—</span>'}</td>
      <td style="font-size:11px;color:var(--muted)">${c.responsable||'<span style="color:var(--soft)">—</span>'}</td>
      <td><div class="stg">${etapasHtml(c.etapas)}</div></td>
      <td>${badgeFull(c)}</td>
      <td>
        ${c.visado==='si'?`<span class="flag f-ok">Vis ✓</span>`:`<span class="flag f-no">Sin visar</span>`}
        ${c.devuelto?`<span class="flag f-ok">Dev ✓</span>`:''}
        ${c.tiene_observacion?`<span class="flag f-warn">Obs ⚠</span>`:''}
        ${c.pago_imprevisto?`<span class="flag f-warn">$ Imp</span>`:''}
      </td>
      <td style="font-size:10px;color:var(--soft)">${c.creado_en||'—'}</td>
      <td style="font-size:11px;white-space:nowrap">${fmtD(c.fecha_fin)}${diasHtml(c)}</td>
    </tr>`).join('')}
    </tbody>
  </table></div>${pgHtml()}`;
}

async function buscar(){
  const q=document.getElementById('search-inp').value.trim();
  const wrap=document.getElementById('results-wrap');
  const hero=document.getElementById('hero-section');
  if(!q){
    gData=[];
    wrap.style.display='none';
    hero.style.paddingTop='';
    hero.style.paddingBottom='';
    return;
  }
  wrap.style.display='block';
  document.getElementById('results-body').innerHTML='<div class="spinner"></div>';
  try{
    const res=await fetch(`/api/contratos?q=${encodeURIComponent(normalizarSiEsRut(q))}`);
    gData=await res.json();
    gPage=1;
    renderTable();
  }catch(e){
    document.getElementById('results-body').innerHTML=`<div class="state-box"><span class="icon">⚠️</span><p>Error de conexión.</p></div>`;
  }
}

function debounceSearch(){clearTimeout(_timer);_timer=setTimeout(buscar,320);}

function normalizarSiEsRut(q){
  // Si el input parece un RUT (solo dígitos y K, con o sin puntos/guión), lo normaliza
  const soloDigitos = q.replace(/[.\-]/g,'');
  if(/^[\dkK]{7,9}$/.test(soloDigitos)) return soloDigitos;
  return q;
}
</script>
</body>
</html>
